# Lint and format config for every Python tree in the repo: the bindings
# (foreign/python), the BDD runner (bdd/python), and the examples
# (examples/python). One config so all of them read the same.
line-length = 100
target-version = "py310"
# The .pyi type stub is generated by pyo3-stub-gen, not hand-written.
extend-exclude = ["*.pyi"]

[lint]
select = ["E", "F", "I", "B", "UP"]
