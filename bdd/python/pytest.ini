[pytest]
asyncio_mode = auto
timeout = 60
markers =
    agent: agent messaging scenarios
    capabilities: capability negotiation scenarios
    governance: governance scenarios
    graph: graph scenarios
    injected: scenarios using injected capabilities
    kv: key-value scenarios
    memory: agent memory scenarios
    provenance: provenance scenarios
    query: managed query scenarios
    runs: run registry scenarios
    streaming: Apache Iggy streaming scenarios
    wire: wire compatibility scenarios
filterwarnings =
    ignore:'maxsplit' is passed as positional argument:DeprecationWarning:gherkin\.gherkin_line
