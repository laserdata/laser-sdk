version: 2
updates:
  - package-ecosystem: npm
    directory: /foreign/typescript
    schedule:
      interval: weekly
    groups:
      development-tools:
        dependency-type: development
        update-types:
          - minor
          - patch
  - package-ecosystem: npm
    directory: /bdd/typescript
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: /examples/typescript
    schedule:
      interval: weekly

  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: cargo
    directory: /foreign/python
    schedule:
      interval: weekly

  - package-ecosystem: pip
    directory: /foreign/python
    schedule:
      interval: weekly

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
